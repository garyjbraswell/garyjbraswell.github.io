cv:
  name: Gary J. Braswell
  label: "Technology Executive & Doctoral Student"
  email: braswe5@students.kennesaw.edu
  website: "https://www.garyjbraswell.phd"
  summary: >
    Technology executive and doctoral student with extensive leadership
    experience across software engineering, digital transformation, enterprise
    platforms, Agile delivery, and cross-functional business-technology
    alignment. Brings more than two decades of practitioner experience leading
    complex technical organizations, managing global teams, overseeing
    multimillion-dollar budgets, and delivering strategic technology initiatives
    in enterprise and SaaS environments. Current PhD student in Information
    Systems with teaching, research, and practitioner interests at the
    intersection of information systems, digital innovation, AI-enabled work,
    and team dynamics in software development. Interested in teaching MBA
    students in areas including information systems, technology strategy, digital
    transformation, innovation, project management, and AI in business.

  sections:
    Experience:
      - position: Vice President of Technology
        company: Travtus
        location: London, UK
        start_date: 2024
        end_date: 2025
        highlights:
          - Served as a U.S.-based proxy for the CTO and as a customer-facing representative of the Technology organization.
          - Oversaw implementation and delivery activities and technical support for client needs.
          - Held accountability for SOC 2 compliance and roadmap execution.
          - Established Agile best practices in product development and managed broader technology governance.

      - position: Vice President of Technology
        company: Beam Living
        location: New York, New York
        start_date: 2022
        end_date: 2024
        highlights:
          - Led the technology function for a multifamily operator with approximately \\$620 million in annual revenue.
          - Managed a department budget of approximately \\$14 million, with an additional \\$5 million in payroll and corporate allocations.
          - Supported a global team of 40 technologists across infrastructure, support, and application development.
          - Championed the rollout of an Agile-based monthly release cycle and improved collaboration between business and technology stakeholders.

      - position: Vice President of Enterprise Solutions
        company: Definition 6
        location: Atlanta, Georgia
        start_date: 2018
        end_date: 2022
        highlights:
          - Managed a distributed engineering team of approximately 15 with a run rate of \\$5 million annually.
          - Oversaw delivery of major Azure-hosted, headless Sitecore implementations, including public-facing digital platforms.
          - Served as client-facing solution owner for multiple launches and led other complex delivery efforts for clients, including Barnes & Noble and the American Heart Association.

      - position: Director of Software Engineering
        company: Altisource
        location: Atlanta, Georgia
        start_date: 2013
        end_date: 2018
        highlights:
          - Oversaw the transformation of a single-tenant Spring/Tomcat order and vendor management application into a multi-tenant, microservice-based marketplace platform in a private cloud.
          - Led engineering, quality assurance, and project management functions across a distributed team of approximately 35.
          - Delivered a product roadmap consisting of multiple concurrent workstreams and managed overall execution of an approximately \\$4 million budget.

      - position: Director of Software Platforms
        company: Emerson Climate Technologies
        location: Atlanta, Georgia
        start_date: 2009
        end_date: 2013
        highlights:
          - Managed a \\$5 million budget and eliminated approximately \\$1 million in consulting costs by growing internal capability.
          - Oversaw re-platforming of a call center application from Oracle E-Business Suite to Oracle Fusion Middleware in a Java, SOA/ESB environment.
          - Managed 30 to 45 developers distributed across China, India, and the United States and helped lead process improvements contributing to CMMI Level 2 certification.

